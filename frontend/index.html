<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD Printer</title>
  <link rel="icon" href="/img/impresora.png" type="image/png" />
  <link rel="stylesheet" href="/css/style.css?v=20260622b" />
</head>
<body>

  <!-- ── Sidebar ───────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <img src="/img/Eitb_corp.svg.png" class="eitb-logo" alt="EITB" />
        <div class="brand-text">
          <span class="logo">CAD Printer</span>
          <span class="version-tag">v2.5.0</span>
        </div>
      </div>
      <button class="btn-icon" id="btn-new-job" title="Lan berria">+</button>
    </div>
    <div class="sidebar-list" id="job-list">
      <p class="empty-hint">Lanik ez</p>
    </div>
  </aside>

  <!-- ── Main panel ────────────────────────────────────────────── -->
  <main id="main">
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">📄</div>
      <h2>Ez dago lanik hautatuta</h2>
      <p>Sortu lan berri bat edo hautatu bat zerrendatik.</p>
      <button class="btn btn-primary" onclick="openNewJobModal()">+ Lan berria</button>
    </div>

    <div id="job-detail" class="hidden">
      <!-- Job header -->
      <div class="job-header">
        <div class="job-title-row">
          <h1 id="job-name" class="job-name" contenteditable="true" spellcheck="false"></h1>
          <span id="job-format-badge" class="format-badge"></span>
        </div>
        <div class="job-actions">
          <button class="btn btn-ghost" id="btn-change-format">Formatua</button>
          <button class="btn btn-ghost" id="btn-activate-job">Aktibatu</button>
          <button class="btn btn-danger" id="btn-delete-job">Ezabatu</button>
          <button class="btn btn-primary" id="btn-export-job">🖨 Inprimatu</button>
        </div>
      </div>

      <!-- Sheets container -->
      <div id="sheets-container"></div>

      <!-- Add sheet button -->
      <div class="add-sheet-row">
        <button class="btn btn-ghost btn-add-sheet" id="btn-add-sheet">+ Orri berria</button>
      </div>
    </div>
  </main>

  <!-- ── Modal: Lan berria ──────────────────────────────────────── -->
  <div id="modal-new-job" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Lan berria</h2>
        <button class="btn-close" onclick="closeNewJobModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>Izena
          <input type="text" id="new-job-name" placeholder="Koadro elektrikoa-01" autocomplete="off" />
        </label>
        <label>Erabiltzailea
          <select id="new-job-user">
            <option value="">— Ez (lan generikoa) —</option>
          </select>
        </label>
        <label>Orri-formatua
          <select id="new-job-format">
            <option value="A0">A0 (841 × 1189 mm)</option>
            <option value="A1">A1 (594 × 841 mm)</option>
            <option value="A2">A2 (420 × 594 mm)</option>
            <option value="A3" selected>A3 (297 × 420 mm)</option>
            <option value="A4">A4 (210 × 297 mm)</option>
            <option value="A5">A5 (148 × 210 mm)</option>
            <option value="A6">A6 (105 × 148 mm)</option>
          </select>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="new-job-activate" checked />
          Aktibatu lan aktibo gisa
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeNewJobModal()">Utzi</button>
        <button class="btn btn-primary" onclick="submitNewJob()">Sortu</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Formatua aldatu ─────────────────────────────────── -->
  <div id="modal-format" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Formatua aldatu</h2>
        <button class="btn-close" onclick="closeFormatModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>Orri-formatua
          <select id="format-select">
            <option value="A0">A0 (841 × 1189 mm)</option>
            <option value="A1">A1 (594 × 841 mm)</option>
            <option value="A2">A2 (420 × 594 mm)</option>
            <option value="A3">A3 (297 × 420 mm)</option>
            <option value="A4">A4 (210 × 297 mm)</option>
            <option value="A5">A5 (148 × 210 mm)</option>
            <option value="A6">A6 (105 × 148 mm)</option>
          </select>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeFormatModal()">Utzi</button>
        <button class="btn btn-primary" onclick="submitFormat()">Gorde</button>
      </div>
    </div>
  </div>

<!-- ── Modal: Zatitu (split) ────────────────────────────────── -->
  <div id="modal-split" class="modal-overlay hidden">
    <div class="modal modal-split-content">
      <div class="modal-header">
        <h2>PDF zatitu tilesetan</h2>
        <button class="btn-close" onclick="closeSplitModal()">✕</button>
      </div>
      <div class="modal-body split-modal-body">
        <div class="split-left">
          <div class="split-preview-wrap" id="split-preview-wrap">
            <img id="split-preview-img" alt="Aurrebista" />
          </div>
          <p class="split-hint">Arrastatu lerro beltzak zatiketa-puntua aldatzeko</p>
        </div>
        <div class="split-right">
          <div class="split-control-group">
            <label>Biraketa
              <button class="split-rotate-btn" id="btn-split-rotate" type="button">↻ Biratu · 0°</button>
            </label>
          </div>
          <div class="split-control-group">
            <label>Zutabeak<input type="number" id="split-cols" value="2" min="1" max="8" /></label>
            <label>Errenkadak<input type="number" id="split-rows" value="1" min="1" max="4" /></label>
          </div>
          <div class="split-control-group">
            <label>Solapamendua
              <div class="split-overlap-row">
                <input type="range" id="split-overlap" min="0" max="30" value="5" />
                <span id="split-overlap-val">5 mm</span>
              </div>
            </label>
          </div>
          <div class="split-control-group">
            <label>Tile formatua
              <select id="split-tile-format">
                <option value="A3" selected>A3</option>
                <option value="A4">A4</option>
                <option value="A2">A2</option>
              </select>
            </label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeSplitModal()">Utzi</button>
        <button class="btn btn-primary" id="btn-submit-split" onclick="submitSplit()">Zatitu</button>
      </div>
    </div>
  </div>

<!-- ── Toast ─────────────────────────────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <script src="/js/app.js?v=20260622b"></script>
</body>
</html>
